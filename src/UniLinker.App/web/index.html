<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniLinker · 跨设备投屏</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a1f26;
    --surface-hover: #242b33;
    --border: #2f3640;
    --text: #e7eaed;
    --text-dim: #8899a6;
    --accent: #1da1f2;
    --accent-hover: #4db5f2;
    --green: #17bf63;
    --red: #ff6b6b;
    --orange: #ffad1f;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: linear-gradient(180deg, rgba(29,161,242,0.08) 0%, transparent 100%);
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--accent) 0%, #667eea 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 12px rgba(29,161,242,0.3);
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .version {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Tabs */
  .tabs {
    display: flex;
    padding: 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:hover { color: var(--text); background: var(--surface-hover); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Main content */
  .main {
    flex: 1;
    padding: 28px;
    overflow-y: auto;
  }

  /* Section */
  .section {
    margin-bottom: 32px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title .icon { font-size: 20px; }

  /* Device card */
  .device-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .device-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .device-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .device-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .device-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }
  .device-name {
    font-size: 15px;
    font-weight: 600;
  }
  .device-address {
    font-size: 12px;
    color: var(--text-dim);
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .device-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .device-status .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
  }
  .device-status .dot.offline { background: var(--text-dim); }

  /* Info card */
  .info-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .info-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--text-dim); font-size: 14px; }
  .info-value { font-size: 14px; font-weight: 500; }
  .info-value code {
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'SF Mono', 'Consolas', monospace;
  }

  /* Button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--surface-hover); }
  .btn-danger {
    background: var(--red);
    color: #fff;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 40px;
    color: var(--text-dim);
  }
  .empty-state .icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* Footer */
  footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🔗</div>
    <div>
      <h1>Uni<span>Linker</span></h1>
    </div>
    <span class="version">v3.0</span>
  </div>
  <div class="header-right">
    <div class="status-indicator">
      <div class="status-dot"></div>
      <span>服务运行中</span>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('devices')">📱 设备发现</div>
  <div class="tab" onclick="showTab('sharing')">📤 投屏分享</div>
  <div class="tab" onclick="showTab('settings')">⚙️ 设置</div>
</div>

<div class="main">
  <!-- Devices Tab -->
  <div id="tab-devices" class="tab-content">
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="icon">📡</span> 局域网设备</div>
        <button class="btn btn-secondary" onclick="refreshDevices()">🔄 刷新</button>
      </div>
      <div id="deviceGrid" class="device-grid">
        <div class="empty-state">
          <div class="icon">🔍</div>
          <h3>正在搜索设备...</h3>
          <p>确保其他 UniLinker 设备在同一局域网内运行</p>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="icon">💻</span> 本机信息</div>
      </div>
      <div class="info-card">
        <div class="info-row">
          <span class="info-label">设备名称</span>
          <span class="info-value" id="deviceName">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">HTTP 端口</span>
          <span class="info-value"><code id="httpPort">9527</code></span>
        </div>
        <div class="info-row">
          <span class="info-label">本机地址</span>
          <span class="info-value"><code id="localIp">—</code></span>
        </div>
        <div class="info-row">
          <span class="info-label">连接数</span>
          <span class="info-value" id="peerCount">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Sharing Tab -->
  <div id="tab-sharing" class="tab-content" style="display:none">
    <div class="section">
      <div class="section-header">
        <div class="section-title"><span class="icon">🖥️</span> 屏幕分享</div>
        <button class="btn btn-primary" onclick="startSharing()">▶️ 开始分享</button>
      </div>
      <div class="info-card">
        <p style="color: var(--text-dim); line-height: 1.8;">
          点击「开始分享」后，其他设备可以连接到本机观看屏幕。<br>
          连接地址：<code style="background: var(--bg); padding: 2px 8px; border-radius: 4px;" id="connectAddr">—</code>
        </p>
      </div>
    </div>
  </div>

  <!-- Settings Tab -->
  <div id="tab-settings" class="tab-content" style="display:none">
    <div class="section">
      <div class="section-title"><span class="icon">⚙️</span> 系统设置</div>
      <div class="info-card">
        <div class="info-row">
          <span class="info-label">投屏分辨率</span>
          <span class="info-value">1920 × 1080</span>
        </div>
        <div class="info-row">
          <span class="info-label">帧率</span>
          <span class="info-value">30 fps</span>
        </div>
        <div class="info-row">
          <span class="info-label">码率</span>
          <span class="info-value">15 Mbps</span>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  UniLinker · 跨设备低延迟投屏 · 基于 WebRTC
</footer>

<script>
  // Tab switching
  function showTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    document.querySelector(`.tab:nth-child(${name === 'devices' ? 1 : name === 'sharing' ? 2 : 3})`).classList.add('active');
    document.getElementById('tab-' + name).style.display = 'block';
  }

  // Load device info
  async function loadInfo() {
    try {
      const status = await (await fetch('/api/status')).json();
      document.getElementById('deviceName').textContent = status.deviceName || 'UniLinker';
      document.getElementById('httpPort').textContent = status.port || '9527';
      document.getElementById('peerCount').textContent = status.peers || '0';
      document.getElementById('connectAddr').textContent =
        window.location.hostname + ':' + (status.port || '9527');
    } catch (e) {
      console.error('Failed to load info:', e);
    }
  }

  // Refresh devices
  function refreshDevices() {
    const grid = document.getElementById('deviceGrid');
    grid.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>正在搜索...</h3></div>';
    // TODO: mDNS discovery via bridge
    setTimeout(() => {
      grid.innerHTML = '<div class="empty-state"><div class="icon">✅</div><h3>暂无其他设备</h3><p>确保设备在同一局域网</p></div>';
    }, 2000);
  }

  // Start sharing
  function startSharing() {
    alert('投屏功能已就绪！其他设备可通过上方地址连接。');
  }

  // Init
  loadInfo();
</script>
</body>
</html>
