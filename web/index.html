<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLinker - Screen Mirror</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4e;
            gap: 12px;
        }
        .logo { font-weight: bold; font-size: 16px; color: #6366F1; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
        }
        .status-dot.connected { background: #22C55E; }
        .status-dot.connecting { background: #F59E0B; animation: pulse 1s infinite; }
        .status-dot.error { background: #EF4444; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .status-text { font-size: 13px; color: #999; }

        /* 信号强度指示器 */
        .signal-indicator {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            margin-left: 8px;
        }
        .signal-bar {
            width: 3px;
            border-radius: 1px;
            background: #374151;
            transition: background 0.3s;
        }
        .signal-bar:nth-child(1) { height: 6px; }
        .signal-bar:nth-child(2) { height: 9px; }
        .signal-bar:nth-child(3) { height: 12px; }
        .signal-bar:nth-child(4) { height: 15px; }
        .signal-bar.active.excellent { background: #22C55E; }
        .signal-bar.active.good { background: #84CC16; }
        .signal-bar.active.fair { background: #F59E0B; }
        .signal-bar.active.poor { background: #EF4444; }

        .info-text { font-size: 12px; color: #666; margin-left: auto; }
        button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            background: #2a2a4e;
            color: #ccc;
            transition: transform 0.1s;
        }
        button:hover { background: #3a3a6e; }
        button:active { transform: scale(0.98); }
        button.primary { background: #6366F1; color: #fff; }
        button.primary:hover { background: #4F46E5; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .main-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #555;
        }
        .placeholder .icon { font-size: 48px; }
        .overlay-info {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            display: none;
        }
        .overlay-info.visible { display: block; }
        .connect-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .connect-row input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #3a3a5e;
            background: #12122a;
            color: #ccc;
            font-size: 13px;
            width: 200px;
        }
        .connect-row input:focus { outline: none; border-color: #6366F1; }

        /* Toast 通知容器 */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 1000;
        }
        .toast {
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid;
            min-width: 280px;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: toastIn 0.3s ease-out;
        }
        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .toast.success { background: rgba(34, 197, 94, 0.1); border-color: #22C55E; }
        .toast.info { background: rgba(59, 130, 246, 0.1); border-color: #3B82F6; }
        .toast.warning { background: rgba(245, 158, 11, 0.1); border-color: #F59E0B; }
        .toast.error { background: rgba(239, 68, 68, 0.1); border-color: #EF4444; }
        .toast .message { flex: 1; font-size: 13px; color: #E5E5E5; }
        .toast .close-btn {
            background: transparent;
            border: none;
            color: #737373;
            cursor: pointer;
            font-size: 12px;
            padding: 2px;
        }

        /* 焦点指示器 */
        :focus-visible {
            outline: 2px solid #6366F1;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="toolbar" role="toolbar" aria-label="主工具栏">
        <span class="logo" aria-label="UniLinker Logo">UniLinker</span>

        <!-- 状态指示器 -->
        <span class="status-dot" id="statusDot" aria-hidden="true"></span>
        <span class="status-text" id="statusText" aria-live="polite">已断开</span>

        <!-- 信号强度指示器 -->
        <div class="signal-indicator" id="signalIndicator" title="连接质量" aria-label="连接质量">
            <span class="signal-bar"></span>
            <span class="signal-bar"></span>
            <span class="signal-bar"></span>
            <span class="signal-bar"></span>
        </div>

        <span class="info-text" id="infoText"></span>

        <div class="connect-row" style="margin-left: auto;">
            <input type="text" id="hostInput" placeholder="Host (e.g. 192.168.1.5)"
                   aria-label="主机地址" tabindex="0">
            <button class="primary" id="btnConnect" onclick="connect()"
                    aria-label="连接" tabindex="0">Connect</button>
            <button id="btnFullscreen" onclick="toggleFullscreen()" disabled
                    aria-label="全屏" tabindex="0">Full</button>
        </div>
    </div>

    <div class="main-area" role="main">
        <div class="placeholder" id="placeholder">
            <span class="icon" aria-hidden="true">📺</span>
            <span>输入主机地址并点击连接</span>
        </div>
        <video id="remoteVideo" autoplay playsinline muted></video>
        <div class="overlay-info" id="overlayInfo" aria-live="off"></div>
    </div>

    <!-- Toast 通知容器 -->
    <div class="toast-container" id="toastContainer" aria-live="polite"></div>

    <script src="app.js"></script>
</body>
</html>
