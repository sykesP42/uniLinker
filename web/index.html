<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLinker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header class="titlebar">
            <span class="logo">UniLinker</span>
            <nav class="tabs" id="tabBar">
                <button class="tab-btn active" data-tab="devices">🔍 Devices</button>
                <button class="tab-btn" data-tab="mirror">📺 Screen Mirror</button>
            </nav>
            <span class="info-text" id="statusText">⚫ Starting...</span>
        </header>
        <main class="content" id="tabContent">
            <div id="tab-devices" class="tab-panel active">
                <h2>LAN Devices</h2>
                <div id="deviceList" class="device-list"></div>
            </div>
            <div id="tab-mirror" class="tab-panel">
                <div class="mirror-controls">
                    <button id="btnStartShare" class="btn primary">📺 Start Sharing</button>
                    <button id="btnStopShare" class="btn" disabled>⏹ Stop Sharing</button>
                </div>
                <div class="mirror-views" id="mirrorViews">
                    <p class="placeholder">Start sharing or watch a device.</p>
                </div>
            </div>
        </main>
        <footer class="statusbar">
            <span id="connectionStatus">Disconnected</span>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
