<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLinker - Screen Mirror</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4e;
            gap: 12px;
        }
        .logo { font-weight: bold; font-size: 16px; color: #7c7cf8; }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
        }
        .status-dot.connected { background: #4caf50; }
        .status-dot.connecting { background: #ff9800; animation: pulse 1s infinite; }
        .status-dot.error { background: #f44336; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .status-text { font-size: 13px; color: #999; }
        .info-text { font-size: 12px; color: #666; margin-left: auto; }
        button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            background: #2a2a4e;
            color: #ccc;
        }
        button:hover { background: #3a3a6e; }
        button.primary { background: #5c5cf0; color: #fff; }
        button.primary:hover { background: #4a4ad0; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .main-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #555;
        }
        .placeholder .icon { font-size: 48px; }
        .overlay-info {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            display: none;
        }
        .overlay-info.visible { display: block; }
        .connect-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .connect-row input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #3a3a5e;
            background: #12122a;
            color: #ccc;
            font-size: 13px;
            width: 200px;
        }
        .connect-row input:focus { outline: none; border-color: #5c5cf0; }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="logo">UniLinker</span>
        <span class="status-dot" id="statusDot"></span>
        <span class="status-text" id="statusText">Disconnected</span>
        <span class="info-text" id="infoText"></span>
        <div class="connect-row" style="margin-left: auto;">
            <input type="text" id="hostInput" placeholder="Host (e.g. 192.168.1.5)" />
            <button class="primary" id="btnConnect" onclick="connect()">Connect</button>
            <button id="btnFullscreen" onclick="toggleFullscreen()" disabled>Full</button>
        </div>
    </div>
    <div class="main-area">
        <div class="placeholder" id="placeholder">
            <span class="icon">&#x1F4FA;</span>
            <span>Enter host address and click Connect</span>
        </div>
        <video id="remoteVideo" autoplay playsinline muted></video>
        <div class="overlay-info" id="overlayInfo"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
