<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniLinker - Screen Mirror</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top bar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 10px 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #4fc3f7;
            letter-spacing: 1px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
            background: #1e1e1e;
            border: 1px solid #333;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected { background: #4caf50; animation: pulse 2s infinite; }
        .status-dot.connecting { background: #ff9800; animation: pulse 1s infinite; }
        .status-dot.error { background: #f44336; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .spacer { flex: 1; }

        .info-text {
            font-size: 12px;
            color: #888;
            font-variant-numeric: tabular-nums;
        }

        button {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { background: #3a3a3a; border-color: #555; }
        button:active { transform: scale(0.97); }

        button.primary {
            background: #1565c0;
            border-color: #1976d2;
            color: white;
        }

        button.primary:hover { background: #1976d2; }

        /* Video area */
        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background: #000;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            color: #555;
        }

        .placeholder svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
        }

        .placeholder p {
            font-size: 14px;
        }

        /* Overlay info */
        .overlay-info {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-variant-numeric: tabular-nums;
            line-height: 1.6;
            pointer-events: none;
            display: none;
        }

        .overlay-info.visible { display: block; }
    </style>
</head>
<body>
    <div class="toolbar">
        <span class="logo">UniLinker</span>
        <div class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>
        <span class="spacer"></span>
        <span class="info-text" id="infoText"></span>
        <button id="btnConnect" class="primary" onclick="connect()">Connect</button>
        <button id="btnFullscreen" onclick="toggleFullscreen()" disabled>Fullscreen</button>
    </div>

    <div class="video-container" id="videoContainer">
        <div class="placeholder" id="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="2" y="3" width="20" height="14" rx="2"/>
                <path d="M8 21h8M12 17v4"/>
            </svg>
            <p>Click <strong>Connect</strong> to start screen mirroring</p>
        </div>
        <video id="remoteVideo" autoplay playsinline style="display:none;"></video>
        <div class="overlay-info" id="overlayInfo"></div>
    </div>

    <script src="client.js"></script>
</body>
</html>
